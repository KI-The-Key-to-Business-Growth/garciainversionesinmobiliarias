name: CI

# Gate de calidad en cada PR a main (y en pushes a main).
# Corre lint, typecheck, tests unitarios y build de producción.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela corridas anteriores del mismo PR/branch si se pushea de nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (unit/integración)
        run: npm test

      - name: Build (producción)
        run: npm run build
