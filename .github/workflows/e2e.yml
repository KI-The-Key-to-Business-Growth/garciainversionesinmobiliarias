name: E2E (nightly)

# Tests E2E de Playwright (health-check): build + carga de páginas + consola.
# NO bloquean PRs (son más lentos y abren un navegador real). Corren de noche
# y se pueden disparar a mano desde la pestaña Actions.
on:
  schedule:
    # 06:00 UTC ≈ 03:00 Argentina (UTC-3). Todos los días.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright health-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E (Playwright hace build + start)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
